version: 2.1
jobs:
  build:  
    working_directory: ~/main
    docker:
      - image: flaviobarros/bancofisica-tests
    steps:
      - run:
          name: Install git and ssh
          command: apt-get update -qq && apt-get install -y git openssh-client
      - checkout
      - run:
          command: | 
            R -e 'devtools::install_deps(dependencies = TRUE)'
      - save_cache:
          key: deps1-{{ .Branch }}-{{ checksum "DESCRIPTION" }}
          paths:
            - "/usr/local/lib/R/site-library"
      - run:
          command: |
            R -e 'source("tests/tests.R")'

          ## store artifacts -----------------
      - store_test_results:
          path: /tmp/Rcheck/tests/
          when: always
      - store_artifacts:
          path: /tmp/Rcheck
          when: always
workflows:
  version: 2
  build:
    jobs:
      - build
