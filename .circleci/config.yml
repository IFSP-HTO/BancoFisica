version: 2.1

jobs:
  build:
    working_directory: ~/main
    docker:
      - image: rocker/verse:4.4.3
    environment:
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true
    steps:
      - run:
          name: Install system tools
          command: |
            apt-get update -qq
            apt-get install -y --no-install-recommends git openssh-client file qpdf
            rm -rf /var/lib/apt/lists/*

      - checkout

      - restore_cache:
          keys:
            - deps-v3-{{ .Branch }}-{{ checksum "DESCRIPTION" }}
            - deps-v3-{{ .Branch }}-
            - deps-v3-

      - run:
          name: Install R dependencies
          command: |
            Rscript - <<'EOF'
            options(repos = c(CRAN = "https://cloud.r-project.org"))

            missing <- setdiff("remotes", rownames(installed.packages()))
            if (length(missing) > 0) {
              install.packages(missing)
            }

            remotes::install_deps(dependencies = TRUE, upgrade = "never")
            EOF

      - save_cache:
          key: deps-v3-{{ .Branch }}-{{ checksum "DESCRIPTION" }}
          paths:
            - "/usr/local/lib/R/site-library"

      - run:
          name: Run BancoFisica tests
          command: |
            Rscript -e 'source("tests/tests.R")'

      - store_test_results:
          path: /tmp/Rcheck/tests/
          when: always

      - store_artifacts:
          path: /tmp/Rcheck
          when: always

workflows:
  version: 2
  build:
    jobs:
      - build
