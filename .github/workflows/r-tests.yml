name: R tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: r-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate public demo site data
        run: |
          python3 tools/generate_demo_site_data.py
          python3 tools/validate_public_site.py

      - name: Install system tools and LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            file \
            qpdf \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-lang-portuguese \
            latexmk
          sudo rm -rf /var/lib/apt/lists/*

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.3'
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          dependencies: '"all"'

      - name: Run BancoFisica tests
        run: |
          Rscript -e 'source("tests/tests.R")'

      - name: Audit solution blocks
        run: |
          Rscript tools/audit_solutions.R

      - name: Generate quality report
        run: |
          Rscript tools/quality_report.R --out-dir build/quality-report

      - name: Generate teaching audit
        run: |
          Rscript tools/audit_teaching.R --out-dir build/quality-report

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: banco-fisica-quality-report
          path: build/quality-report
